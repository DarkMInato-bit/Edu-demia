services:
  # 🏛️ Institutional API (NestJS)
  backend:
    build:
      context: ..
      dockerfile: Dockerfile-be
    ports:
      - "3001:3001"
    env_file:
      - ../apps/backend/.env
    networks:
      - glacier-network
    restart: always

  # 🏛️ Institutional Frontend (Next.js)
  frontend:
    build:
      context: ..
      dockerfile: Dockerfile-fe
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    networks:
      - glacier-network
    restart: always

networks:
  glacier-network:
    driver: bridge
